# ----------------------------------------
# Qwen3.5-0.8B
# 规模：0.8B | 量化：Q4_K_XL
# 标签：chat, chinese
# 说明：阿里巴巴 Qwen3.5 系列轻量级模型，适合快速推理
# 参数配置:
#   - temperature=0.7 (温度，控制随机性)
#   - top_p=0.8 (核采样概率)
#   - top_k=20 (Top-K 采样)
#   - presence_penalty=1.5 (存在惩罚，鼓励新话题)
#   - repetition_penalty=1.0 (重复惩罚，避免重复)
#   - parallel=1 (并行请求数，-np)
#   - batch_size=512 (批次大小，-b)
#   - gpu_layers=99 (GPU 层数，-ngl)
# ----------------------------------------
- id: qwen3.5-0.8b
  path: language-models/Qwen3.5/Qwen3.5-0.8B-UD-Q4_K_XL.gguf
  name: Qwen3.5-0.8B
  type: language-model
  category: Qwen
  format: gguf
  size: 0.8B
  quantization: Q4_K_XL
  tags:
    - chat
    - chinese
  description: 阿里巴巴 Qwen3.5 系列轻量级模型，适合快速推理
  # --- 运行参数 ---
  backend: llama
  max_context: 32768
  default_temp: 0.7
  default_top_p: 0.8
  default_top_k: 20
  enable_thinking: False
  presence_penalty: 1.5
  repetition_penalty: 1.0
  parallel: 1
  batch_size: 512
  gpu_layers: 99

