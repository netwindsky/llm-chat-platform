# LLM 推理平台服务器配置

server:
  # API 服务器配置
  host: 0.0.0.0
  port: 8080
  reload: false
  workers: 1
  log_level: info
  
  # CORS 设置
  cors:
    enabled: true
    origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://127.0.0.1:5173
      - http://127.0.0.1:3000
    allow_credentials: true
    allow_methods:
      - "*"
    allow_headers:
      - "*"

  # 认证设置
  auth:
    enabled: false
    secret_key: "your-secret-key-change-in-production"
    algorithm: HS256
    access_token_expire_minutes: 60

  # 速率限制
  rate_limit:
    enabled: false
    requests_per_minute: 60
    burst: 10

# 数据库配置
database:
  type: sqlite
  path: data/database/llm_platform.db
  echo: false
  pool_size: 5
  max_overflow: 10

# 缓存配置
cache:
  enabled: true
  type: memory
  ttl: 3600
  max_size: 1000

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/server/app.log
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 模型加载配置
model_loading:
  max_loaded_models: 3
  preload_models: []
  auto_unload_idle_minutes: 30
  enable_lru: true

# 会话配置
session:
  max_history_messages: 100
  default_context_size: 32768
  enable_history: true
  history_storage: database

# 监控配置
monitoring:
  enable_metrics: true
  metrics_port: 9090
  enable_health_check: true
  health_check_interval: 30
